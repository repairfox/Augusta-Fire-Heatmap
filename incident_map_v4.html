function sw(c){return '<span class="sw" style="background:'+c+'"></span>';}
function popupHtml(p){return '<b>Incident #'+p[2]+'</b><br>'+p[3]+'<br>'+p[4]+'<br><small>Agencies: '+p[5]+'</small>';}
function makeClusterIcon(color){
  return function(cluster){
    var n = cluster.getChildCount();
    return L.divIcon({html:'<div style="background:'+color+';opacity:.85;border-radius:50%;'+
      'width:36px;height:36px;display:flex;align-items:center;justify-content:center;'+
      'color:#fff;font-weight:bold;border:2px solid #fff;">'+n+'</div>',
      className:'', iconSize:[36,36]});
  };
}

var overlay = {label:'<b>All Incidents</b>', selectAllCheckbox:true, children:[]};
var CATREG = {};   // registry: cat -> {heat, subs:[grp,...]}

for (var cat in DATA){
  var cd = DATA[cat];
  var catNode = {label: sw(cd.color)+'<b>'+cd.display+'</b>', selectAllCheckbox:true, children:[]};
  var isDefault = (cat === 'Fire');

  // ONE shared cluster group for the whole category
  var parent = L.markerClusterGroup({iconCreateFunction: makeClusterIcon(cd.color),
       spiderfyOnMaxZoom:true, showCoverageOnHover:false, maxClusterRadius:45});
  if (isDefault) parent.addTo(map);

  // heat starts empty; it gets filled by recomputeHeat() from active subs
  var heat = L.heatLayer([], {radius:25,blur:12,minOpacity:0.4,maxZoom:18,gradient:cd.heatgrad});
  CATREG[cat] = {heat: heat, subs: []};

  for (var sub in cd.subs){
    var sd = cd.subs[sub];
    var grp = L.featureGroup.subGroup(parent);
    var hpts = [];
    sd.pts.forEach(function(p){
       var ag = parseInt(p[5])||1, rad = 4 + Math.min(ag,8)*0.8;
       L.circleMarker([p[0],p[1]],{radius:rad,color:'#333',weight:0.6,fillColor:sd.color,fillOpacity:0.85})
        .bindPopup(popupHtml(p)).addTo(grp);
       hpts.push([p[0],p[1],Math.min(ag,6)]);
    });
    grp._heatPts = hpts;   // this sub's heat contribution
    grp._cat = cat;        // which category it belongs to
    if (isDefault) grp.addTo(map);
    CATREG[cat].subs.push(grp);
    catNode.children.push({label: sw(sd.color)+sub+' ('+sd.pts.length+')', layer: grp});
  }

  if (isDefault) heat.addTo(map);
  catNode.children.unshift({label:'🔥 Heatmap', layer:heat});
  overlay.children.push(catNode);
}

// Rebuild a category's heatmap from only its currently-active subcategories
function recomputeHeat(cat){
  var reg = CATREG[cat], pts = [];
  reg.subs.forEach(function(g){ if (map.hasLayer(g)) pts = pts.concat(g._heatPts); });
  reg.heat.setLatLngs(pts);
}

// When a subcategory is toggled, refresh that category's heatmap
map.on('overlayadd overlayremove', function(e){
  if (e.layer && e.layer._cat) recomputeHeat(e.layer._cat);
});

// Set initial heat data (Fire = all its points, others empty)
for (var c in CATREG) recomputeHeat(c);
